name: care_talk
description: "CareTalk - ChatBot Phòng Khám"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0-16.0.dev

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^15.1.2

  # State Management
  provider: ^6.1.5

  # Network
  dio: ^5.8.0+1

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.3

  # Local Storage
  shared_preferences: ^2.5.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.7
  logger: ^2.5.0
  connectivity_plus: ^6.1.4
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts loaded via google_fonts package

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/img_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
